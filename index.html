<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tamime Kaddour</title>

<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#28282d;
  --bg2:#1f1f23;
  --text:#f6e6d1;
  --green:#1aa37a;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Lexend',sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* NAV */
nav{
  position:fixed;
  width:100%;
  padding:20px 40px;
  display:flex;
  justify-content:space-between;
  z-index:1000;
  transition:.4s;
}

nav.scrolled{
  backdrop-filter:blur(10px);
  background:rgba(31,31,35,.7);
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  align-items:flex-end;
  padding:60px;
}

.hero h1{
  font-size:clamp(50px,7vw,110px);
  line-height:.9;
}

.hero span{
  color:var(--green);
}

/* PROJECTS */
.projects{
  padding:120px 40px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
}

.card{
  position:relative;
  overflow:hidden;
  aspect-ratio:4/3;
}

.card img{
  width:100%;
  height:100%;
  object-fit:cover;
  transition:.7s cubic-bezier(.22,1,.36,1);
}

.card:hover img{
  transform:scale(1.1);
}

.card::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.8),transparent);
  opacity:0;
  transition:.4s;
}

.card:hover::after{
  opacity:1;
}

.card-content{
  position:absolute;
  bottom:20px;
  left:20px;
  opacity:0;
  transform:translateY(20px);
  transition:.4s;
}

.card:hover .card-content{
  opacity:1;
  transform:translateY(0);
}

/* ABOUT */
.about{
  padding:120px 40px;
  max-width:800px;
}

/* CAPABILITIES */
.capabilities{
  padding:120px 40px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.cap{
  background:var(--bg2);
  padding:40px;
}

/* CTA */
.cta{
  text-align:center;
  padding:140px 20px;
}

.cta a{
  border:1px solid var(--text);
  padding:15px 40px;
  text-decoration:none;
  color:var(--text);
  transition:.3s;
}

.cta a:hover{
  background:var(--text);
  color:var(--bg);
}

/* FOOTER */
footer{
  padding:40px;
  text-align:center;
  opacity:.5;
}

/* MOBILE */
@media(max-width:900px){
  .projects{grid-template-columns:1fr;}
  .capabilities{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<nav id="nav">
  <div>TAMIME</div>
  <div>Portfolio</div>
</nav>

<section class="hero">
  <h1>
    Creative<br>
    <span>Direction</span><br>
    & Design
  </h1>
</section>

<section class="projects">

<a href="projects.html" class="card">
  <img src="project-02.jpg">
  <div class="card-content">Project</div>
</a>

<a href="projects.html" class="card">
  <img src="project-03.jpg">
  <div class="card-content">Project</div>
</a>

<a href="projects.html" class="card">
  <img src="project-04.jpg">
  <div class="card-content">Project</div>
</a>

<a href="projects.html" class="card">
  <img src="project-05.jpg">
  <div class="card-content">Project</div>
</a>

<a href="projects.html" class="card">
  <img src="project-06.jpg">
  <div class="card-content">Project</div>
</a>

</section>

<section class="about">
  <p>
  I design visual systems and digital experiences that combine clarity, impact and storytelling.
  </p>
</section>

<section class="capabilities">
  <div class="cap">Branding</div>
  <div class="cap">Motion</div>
  <div class="cap">3D</div>
</section>

<section class="cta">
  <h2>Let’s build something bold</h2><br>
  <a href="#">Start a Project</a>
</section>

<footer>
© 2026 Tamime Kaddour
</footer>

<script>
const nav = document.getElementById("nav");
let last = 0;

window.addEventListener("scroll", () => {
  let current = window.scrollY;

  if(current > 50){
    nav.classList.add("scrolled");
  } else {
    nav.classList.remove("scrolled");
  }

  if(current > last && current > 200){
    nav.style.transform="translateY(-100%)";
  } else {
    nav.style.transform="translateY(0)";
  }

  last = current;
});
</script>

</body>
</html>
